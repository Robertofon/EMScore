# Mosquitto MQTT Broker Configuration for EMS Core

# Basic settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Network settings
listener 1883
protocol mqtt

# WebSocket support (optional)
listener 9001
protocol websockets

# Security settings (development mode - no authentication)
allow_anonymous true

# Connection settings
max_connections 1000
max_inflight_messages 100
max_queued_messages 1000

# Message size limits
message_size_limit 1048576

# Persistence settings
autosave_interval 1800
autosave_on_changes false

# Client settings
persistent_client_expiration 2h

# Bridge settings (if needed for cloud connectivity)
# connection bridge-to-cloud
# address cloud-mqtt-broker:1883
# topic ems/# out 0
# topic ems/# in 0