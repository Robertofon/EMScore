on:
  push:
    branches:
      - main
      - "feature/**"
      - "issue/**"

jobs:
  build-and-test:
    runs-on: docker
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - name: Check out code
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Restore dependencies
        run: dotnet restore EMSCore.sln

      - name: Build
        run: dotnet build EMSCore.sln --no-restore

      - name: Run tests
        run: dotnet test EMSCore.sln --no-build --verbosity normal
